version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: marketing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketing}
      POSTGRES_DB: ${POSTGRES_DB:-marketing}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketing} -d ${POSTGRES_DB:-marketing}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:s
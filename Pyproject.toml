[project]
name = "marketing-data-platform"
version = "0.1.0"
description = "Marketing and sales data pipeline using Postgres, Olist + Faker"
requires-python = ">=3.11"
dependance = [
    "psycopg2-binary>=2.9",
    "python-dotenv>=1.0",
    "faker>=24.0",
    "pyarrow>=15.0",
    "pandas>=2.0",
    "requests>=2.31",
    "typer>=0.9",
]

[project.optional-dependancies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.9",
    "pre-commit>=3.7",
]

[project.scripts]
platform = "marketing_platform.scripts.cli:app"

[build-system]
requires = ["hatching"]
build-backend = "hatching.build"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true 

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=marketing_platform --cov-report=term-missing"

[tool.coverage.run]
omit = ["__init__.py", "scripts/*"]
